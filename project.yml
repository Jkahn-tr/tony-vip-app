name: TonyVIP
options:
  bundleIdPrefix: com.tonyrobbins
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  TonyVIP:
    type: application
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - TonyVIP/TonyVIP
    info:
      path: TonyVIP/TonyVIP/Info.plist
      properties:
        CFBundleName: TonyVIP
        CFBundleDisplayName: Tony VIP
        CFBundleIdentifier: com.tonyrobbins.tonyvip
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tonyrobbins.tonyvip
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        INFOPLIST_FILE: TonyVIP/TonyVIP/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
